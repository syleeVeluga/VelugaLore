[package]
name = "weki-desktop"
version = "0.0.0"
description = "WekiDocs desktop shell"
authors = ["Veluga"]
edition = "2021"

[lib]
name = "weki_desktop"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
notify = "6"
